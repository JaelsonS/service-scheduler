# Mantém a API no Render acordada (plano free dorme ~15 min sem tráfego).
# Isso reduz drasticamente a lentidão na primeira visita no celular.
name: Keep API warm

on:
  schedule:
    # A cada 10 minutos (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Wake Render API
        run: |
          set -euo pipefail
          URL="${API_HEALTH_URL:-https://service-scheduler-l3g7.onrender.com/actuator/health}"
          echo "Pinging $URL"
          # Até 3 tentativas — cold start pode passar de 1 minuto
          for i in 1 2 3; do
            if curl -fsS --max-time 90 "$URL"; then
              echo
              echo "OK (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed; retrying..."
            sleep 5
          done
          echo "API "
          exit 1
        env:
          API_HEALTH_URL: https://service-scheduler-l3g7.onrender.com/actuator/health
