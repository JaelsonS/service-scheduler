services:
  - type: web
    name: service-scheduler-api
    runtime: java
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: ./mvnw -DskipTests package
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JAVA_VERSION
        value: "25"
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_ACCESS_MINUTES
        value: "30"
      - key: JWT_REFRESH_DAYS
        value: "7"
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
      - key: SPRINGDOC_ENABLED
        value: "false"
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "1"
