spring.application.name=service-scheduler
spring.profiles.default=dev

server.port=${PORT:8080}

# Datasource is always driven by env vars so Render (prod) never falls back to localhost.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=${app.timezone:America/Sao_Paulo}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3

spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT_MS:30000}

app.timezone=${APP_TIMEZONE:America/Sao_Paulo}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.jwt.secret=${JWT_SECRET:change-me-dev-secret-must-be-at-least-32-chars!!}
app.security.jwt.access-token-expiration-minutes=${JWT_ACCESS_MINUTES:30}
app.security.jwt.refresh-token-expiration-days=${JWT_REFRESH_DAYS:7}
app.admin.email=${ADMIN_EMAIL:admin@agendapro.local}
app.admin.password=${ADMIN_PASSWORD:Admin@12345}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
